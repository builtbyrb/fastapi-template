services:
  postgredb:
    image: postgres:16-alpine
    container_name: postgredb
    restart: unless-stopped
    networks:
      - fastapi-net
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1024M
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_HOST_AUTH_METHOD: md5
      POSTGRES_INITDB_ARGS: --auth=md5
    healthcheck:
      test: ["CMD-SHELL", "pg_isready", "-d", "${POSTGRES_DB}"]
      interval: 1m30s
      timeout: 30s
      retries: 5
      start_period: 20s

  pgbouncer:
    image: edoburu/pgbouncer:v1.25.1-p0
    container_name: pgbouncer
    restart: unless-stopped
    networks:
      - fastapi-net
    deploy:
      resources:
        limits:
          cpus: "0.1"
          memory: 64M
    environment:
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_HOST: ${POSTGRES_HOST}
      DB_NAME: ${POSTGRES_DB}
      ADMIN_USERS: postgres,admin
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 1000
      DEFAULT_POOL_SIZE: 90
    healthcheck:
      test: ["CMD", "pg_isready", "-h", "${POSTGRES_HOST}"]
      interval: 1m30s
      timeout: 30s
      retries: 5
      start_period: 20s
    depends_on:
      postgredb:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    networks:
      - fastapi-net
    deploy:
      resources:
        limits:
          cpus: "0.2"
          memory: 512M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 1m30s
      timeout: 30s
      retries: 5
      start_period: 20s

  adminer:
    image: adminer:5.4.2-standalone
    container_name: adminer
    restart: unless-stopped
    networks:
      - fastapi-net
    deploy:
      resources:
        limits:
          cpus: "0.1"
          memory: 64M
    ports:
      - 8081:8080
    environment:
      ADMINER_DEFAULT_SERVER: pgbouncer
      ADMINER_DEFAULT_SYSTEM: pgsql
    depends_on:
      pgbouncer:
        condition: service_healthy
      postgredb:
        condition: service_healthy

  cadvisor:
    container_name: cadvisor
    restart: unless-stopped
    image: ghcr.io/google/cadvisor:v0.53.0
    volumes:
      - /:/rootfs:ro
      - /sys:/sys:ro
      - /var/run:/var/run:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    privileged: true
    devices:
      - /dev/kmsg
    deploy:
      resources:
        limits:
          cpus: "0.1"
          memory: 128M
    networks:
      - fastapi-net
    ports:
      - 8080:8080
    healthcheck:
      test: wget --spider http://localhost:8080/cadvisor/healthz || exit 1
      interval: 1m30s
      timeout: 30s
      retries: 5
      start_period: 20s

  vector:
    container_name: vector
    restart: unless-stopped
    image: timberio/vector:0.54.0-debian
    volumes:
      - ./vector_dev.toml:/etc/vector/vector_dev.toml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    environment:
      - VECTOR_CONFIG=/etc/vector/vector_dev.toml
    networks:
      - fastapi-net
    deploy:
      resources:
        limits:
          cpus: "0.1"
          memory: 128M
    healthcheck:
      test: wget --spider http://localhost:8686/health || exit 1
      interval: 1m30s
      timeout: 30s
      retries: 5
      start_period: 20s
    depends_on:
      cadvisor:
        condition: service_healthy

  fastapi:
    build: .
    entrypoint:
      ["fastapi", "dev", "src/app.py", "--host", "0.0.0.0", "--port", "8000"]
    restart: unless-stopped
    networks:
      - fastapi-net
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M
    ports:
      - 8000:8000
    env_file:
      - .env
    healthcheck:
      test: python3 -c "import urllib.request; urllib.request.urlopen('http://localhost:8000/health/', timeout=5)"
      interval: 30s
      timeout: 15s
      retries: 5
      start_period: 20s
    depends_on:
      pgbouncer:
        condition: service_healthy
      postgredb:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./src:/app/src

networks:
  fastapi-net:
    name: fastapi-net
