services:
  docker-proxy:
    image: tecnativa/docker-socket-proxy:v0.4.2
    container_name: docker-proxy
    restart: unless-stopped
    networks:
      - docker-proxy-net
    deploy:
      resources:
        limits:
          cpus: "0.1"
          memory: 64M
    environment:
      - CONTAINERS=1
    healthcheck:
      test: wget --spider http://docker-proxy:2375/version || exit 1
      interval: 1m30s
      timeout: 30s
      retries: 5
      start_period: 20s
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

  traefik:
    image: traefik:v3.6.12
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--entrypoints.web.address=:80"
      - "--providers.docker.endpoint=tcp://docker-proxy:2375"
      - "--providers.docker.exposedbydefault=false"
    ports:
      - "80:80"
      - "8080:8080"
    networks:
      - public-net
      - docker-proxy-net
      - fastapi-net
    deploy:
      resources:
        limits:
          cpus: "1.5"
          memory: 512M
    healthcheck:
      test: traefik healthcheck --ping
      interval: 1m30s
      timeout: 30s
      retries: 5
      start_period: 20s
    depends_on:
      docker-proxy:
        condition: service_healthy
