services:
  postgredb:
    image: postgres:16-alpine
    container_name: postgredb
    restart: unless-stopped
    networks:
      - pgbouncer-net
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_HOST_AUTH_METHOD: md5
      POSTGRES_INITDB_ARGS: --auth=md5
    healthcheck:
      test: ["CMD-SHELL", "pg_isready", "-d", "${POSTGRES_DB}"]
      interval: 1m30s
      timeout: 30s
      retries: 5
      start_period: 20s

  pgbouncer:
    image: edoburu/pgbouncer:v1.25.1-p0
    container_name: pgbouncer
    restart: unless-stopped
    networks:
      - database-net
      - pgbouncer-net
    deploy:
      resources:
        limits:
          cpus: "0.1"
          memory: 16M
    environment:
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_HOST: ${POSTGRES_HOST}
      DB_NAME: ${POSTGRES_DB}
      ADMIN_USERS: postgres,admin
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 1000
      DEFAULT_POOL_SIZE: 50
    healthcheck:
      test: ["CMD", "pg_isready", "-h", "${POSTGRES_HOST}"]
      interval: 1m30s
      timeout: 30s
      retries: 5
      start_period: 20s
    depends_on:
      postgredb:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    networks:
      - database-net
    deploy:
      resources:
        limits:
          cpus: "0.2"
          memory: 512M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 1m30s
      timeout: 30s
      retries: 5
      start_period: 20s

  adminer:
    image: adminer:5.4.2-standalone
    container_name: adminer
    restart: unless-stopped
    networks:
      - database-net
      - public-net
    deploy:
      resources:
        limits:
          cpus: "0.1"
          memory: 64M
    ports:
      - 8081:8080
    environment:
      ADMINER_DEFAULT_SERVER: pgbouncer
      ADMINER_DEFAULT_SYSTEM: pgsql
    depends_on:
      pgbouncer:
        condition: service_healthy
      postgredb:
        condition: service_healthy
