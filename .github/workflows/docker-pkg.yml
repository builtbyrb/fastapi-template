name: Docker Image CI for GHCR
on: 
  push
jobs:
  build_and_publish:
    permissions:
      contents: read
      packages: write
    runs-on: ubuntu-latest
    steps: 
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.14'
          cache: 'pip'
      
      - name: Install Commitizen
        run: pip install commitizen
      
      - name: Get version
        id: get_version
        run: echo "project_version=$(cz version --project)" >> $GITHUB_OUTPUT

      - name: Login to docker
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login --username ${{ github.actor }} --password-stdin ghcr.io
  
      - name: Build and push the image
        run : |          
          docker build . \
            --tag ghcr.io/builtbyrb/fastapi-template:${{ steps.get_version.outputs.project_version }} \
            --tag ghcr.io/builtbyrb/fastapi-template:latest

          docker push ghcr.io/builtbyrb/fastapi-template:${{steps.get_version.outputs.project_version}}
          docker push ghcr.io/builtbyrb/fastapi-template:latest