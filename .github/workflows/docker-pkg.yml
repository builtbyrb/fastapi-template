name: Docker Image CI for GHCR
on: 
  workflow_dispatch:
    inputs:
      fastapi_scale:
        description: 'The number of api replication in docker'
        required: true
        default: 1
        type: number
      host:
        description: 'The ssh host'
        required: true
        type: string
      username:
        description: 'The ssh username'
        required: true
        type: string
      password:
        description: 'The ssh password'
        required: true
        type: string
      port:
        description: 'The ssh port'
        required: true
        default: 22
        type: number
      
jobs:
  deploy:
    permissions:
      packages: read
    runs-on: ubuntu-latest
    steps:
      - name: Deploy project over SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ inputs.host }}
          username: ${{ inputs.username }}
          password: ${{ inputs.password }}
          port: ${{ inputs.port }}
          script: |
            cd ~/fastapi-template
            git pull
            docker compose --env-file .env.prod down
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login --username ${{ github.repository_owner }} --password-stdin
            docker compose pull
            docker logout ghcr.io
            rm ~/.docker/config.json
            docker compose --env-file .env.prod up -d --scale fastapi=${{ inputs.fastapi_scale }}
