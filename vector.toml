[api]
enabled = true
address = "0.0.0.0:8686"

[sources.docker_logs]
type = "docker_logs"
docker_host = "tcp://docker-proxy:2375"

[sources.cadvisor_metrics]
type = "prometheus_scrape"
scrape_interval_secs = 30
scrape_timeout_secs = 5
endpoints = ["http://10.66.66.1:8082/metrics"]

[transforms.json_docker_logs]
type = "remap"
inputs = ["docker_logs"]
source = '''
parsed_message, err = parse_json(.message)


if err != null || !is_object(parsed_message){
    .vector_to_json_processed = false
    return .
}

.json_message = parsed_message
.vector_to_json_processed = true
del(.message)
'''

[transforms.cadvisor_max_memory]
type = "filter"
inputs = ["cadvisor_metrics"]
condition = """ .name == "container_spec_memory_limit_bytes" """

[transforms.cadvisor_current_memory]
type = "filter"
inputs = ["cadvisor_metrics"]
condition = """ .name == "container_memory_working_set_bytes" """

[transforms.cadvisor_cpu_usage_seconds]
type = "filter"
inputs = ["cadvisor_metrics"]
condition = """ .name == "container_cpu_usage_seconds_total" """

[transforms.cadvisor_cpu_quota]
type = "filter"
inputs = ["cadvisor_metrics"]
condition = """ .name == "container_spec_cpu_quota" """

[transforms.cadvisor_cpu_period]
type = "filter"
inputs = ["cadvisor_metrics"]
condition = """ .name == "container_spec_cpu_period" """

[transforms.cadvisor_machine_cores]
type = "filter"
inputs = ["cadvisor_metrics"]
condition = """ .name == "machine_cpu_cores" """

[sinks.axiom]
type = "axiom"
inputs = [
    "json_docker_logs",
    "host_metrics",
    "cadvisor_current_memory",
    "cadvisor_max_memory",
    "cadvisor_cpu_usage_seconds",
    "cadvisor_cpu_quota",
    "cadvisor_cpu_period",
    "cadvisor_machine_cores",
]
token = "${AXIOM_TOKEN}"
dataset = "${AXIOM_DATASET_NAME}"
region = "${AXIOM_REGION}"
