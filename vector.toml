[api]
enabled = true
address = "0.0.0.0:8686"

[sources.docker_logs]
type = "docker_logs"
docker_host = "tcp://docker-proxy:2375"

[sources.host_metrics]
type = "host_metrics"
collectors = ["load"]
scrape_interval_secs = 15

[transforms.to_json]
type = "remap"
inputs = ["docker_logs"]
source = '''
. = parse_json!(string!(.log))

if exists(.timestamp) {
    parsed_timestamp, err = timestamp(.timestamp)
    if err == null {
        .timestamp = parsed_timestamp
    } else {
        .timestamp = now()
    }
} else {
    .timestamp = now()
}

if exists(.msg) && is_string(.msg) {
    .msg = downcase!(.msg)
}
'''

[sinks.axiom]
type = "axiom"
inputs = ["docker_logs", "host_metrics"]
token = "${AXIOM_TOKEN}"
dataset = "${AXIOM_DATASET_NAME}"
region = "${AXIOM_REGION}"
