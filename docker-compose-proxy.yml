services:
  docker-proxy:
    container_name: docker-proxy
    restart: unless-stopped
    image: tecnativa/docker-socket-proxy:v0.4.2
    environment:
      - CONTAINERS=1
    networks:
      - docker-proxy-net
    cpus: "0.1"
    memory: 64M
    healthcheck:
      test: wget --spider http://docker-proxy:2375/version || exit 1
      interval: 1m30s
      timeout: 30s
      retries: 5
      start_period: 20s
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro

  traefik:
    container_name: traefik
    restart: unless-stopped
    image: traefik:v3.6.12
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--entrypoints.web.address=:${ENTRYPOINT_PORT}"
      - "--providers.docker.endpoint=tcp://docker-proxy:2375"
      - "--providers.docker.exposedbydefault=false"
    networks:
      - public-net
      - docker-proxy-net
      - fastapi-net
    ports:
      - "80:80"
      - "8080:8080"
    cpus: "0.5"
    memory: 128M
    healthcheck:
      test: traefik healthcheck --ping
      interval: 1m30s
      timeout: 30s
      retries: 5
      start_period: 20s
    depends_on:
      fastapi:
        condition: service_healthy
      docker-proxy:
        condition: service_healthy
