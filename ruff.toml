# ==============================================================================
# RUFF CONFIGURATION
# ==============================================================================
# Fast Python linter and formatter. 
# Replaces: Isort, Black, Flake8, Pyupgrade, etc.

# ------------------------------------------------------------------------------
# GLOBAL SETTINGS
# ------------------------------------------------------------------------------
src = ["src"]
line-length = 85
indent-width = 4

# Directories excluded from scanning
exclude = [
    ".bzr",
    ".direnv",
    ".eggs",
    ".git",
    ".git-rewrite",
    ".hg",
    ".ipynb_checkpoints",
    ".mypy_cache",
    ".nox",
    ".pants.d",
    ".pyenv",
    ".pytest_cache",
    ".pytype",
    ".ruff_cache",
    ".svn",
    ".tox",
    ".venv",
    ".vscode",
    "pypackages",
    "_build",
    "buck-out",
    "build",
    "dist",
    "node_modules",
    "site-packages",
    "venv",
    "alembic_db",
]

# ------------------------------------------------------------------------------
# FORMATTER (Replacement for Black)
# ------------------------------------------------------------------------------
[format]
quote-style = "double"
indent-style = "space"
line-ending = "auto"
skip-magic-trailing-comma = false
docstring-code-format = true
docstring-code-line-length = "dynamic"

# ------------------------------------------------------------------------------
# LINTER RULES
# ------------------------------------------------------------------------------
[lint]
select = ["ALL"] # Enable every rule by default

ignore = [
    "D",      # pydocstyle (Docstrings) - Often too verbose for backend APIs
    "COM812", # Missing trailing comma - Conflicts with Ruff formatter
    "N818",   # Exception name suffix - Allows custom naming conventions
    "ANN401", # Dynamically typed expressions (Any) - Necessary in some generic contexts
    "SLF001", # Private member access - Allow within the same package
    "FA102",  # Missing __future__ annotations - PEP 604 is standard in 3.10+
    "UP046",  # Generic subclass usage
    "TC"
]

# Auto-fix behavior
fixable = ["ALL"]
unfixable = [
    "T201", # print() statements - Keep manual review before removal
]

# Regex for allowed dummy variables (e.g., _, _unused)
dummy-variable-rgx = "^(_+|(_+[a-zA-Z0-9_]*[a-zA-Z0-9]+?))$"

# ------------------------------------------------------------------------------
# LINTER PLUGINS CONFIGURATION
# ------------------------------------------------------------------------------

# ISORT: Import sorting
[lint.isort]
case-sensitive = false
combine-as-imports = true
lines-after-imports = 2
order-by-type = true
known-first-party = ["src"]
section-order = [
    "future",
    "standard-library",
    "third-party",
    "first-party",
    "local-folder",
]

# FLAKE8-TIDY-IMPORTS: Clean import structure
[lint.flake8-tidy-imports]
ban-relative-imports = "all"

# FLAKE8-TYPE-CHECKING: Automated TYPE_CHECKING blocks
[lint.flake8-type-checking]
runtime-evaluated-base-classes = [
    "pydantic.BaseModel",
    "pydantic_settings.BaseSettings",
    "sqlalchemy.orm.DeclarativeBase",
]
runtime-evaluated-decorators = ["pydantic.validate_call", "attrs.define"]

# ------------------------------------------------------------------------------
# PER-FILE OVERRIDES
# ------------------------------------------------------------------------------
[lint.per-file-ignores]
# Rules for Test files
"tests/**/*.py" = [
    "S101",    # Allow assert
    "PLR2004", # Allow magic numbers
    "S105",    # Allow hardcoded passwords
    "S106",    # Allow hardcoded password assignments
]

# Rules for common Type-Checking heavy files
"**/dependencies.py" = ["TC"]
"**/router.py" = ["TC"]
"**/models.py" = ["TC"]
