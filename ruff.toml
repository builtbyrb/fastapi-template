# ==============================================================================
# RUFF CONFIGURATION
# ==============================================================================
# Fast Python linter and formatter. 
# Replaces: Isort, Black, Flake8, Pyupgrade, etc.

# ------------------------------------------------------------------------------
# GLOBAL SETTINGS
# ------------------------------------------------------------------------------
src = ["src"]
line-length = 88
indent-width = 4

target-version = "py313"

# Directories excluded from scanning
exclude = [
    ".bzr",
    ".direnv",
    ".eggs",
    ".git",
    ".git-rewrite",
    ".hg",
    ".ipynb_checkpoints",
    ".mypy_cache",
    ".nox",
    ".pants.d",
    ".pyenv",
    ".pytest_cache",
    ".pytype",
    ".ruff_cache",
    ".svn",
    ".tox",
    ".venv",
    ".vscode",
    "pypackages",
    "_build",
    "buck-out",
    "build",
    "dist",
    "node_modules",
    "site-packages",
    "venv",
    "alembic_db",
    "__pypackages__",
]

[format]
quote-style = "double"
indent-style = "space"
line-ending = "auto"
skip-magic-trailing-comma = false
docstring-code-format = true
docstring-code-line-length = "dynamic"

[lint]
select = ["ALL"] # Enable every rule by default

ignore = [
    "D",
    "COM812",
    "N818",
    "ANN401",
    "SLF001",
    "FA102",
    "UP046",
    "TC",
]

# Auto-fix behavior
fixable = ["ALL"]
unfixable = [
    "T201", # print() statements - Keep manual review before removal
]

# Regex for allowed dummy variables (e.g., _, _unused)
dummy-variable-rgx = "^(_+|(_+[a-zA-Z0-9_]*[a-zA-Z0-9]+?))$"

# ISORT: Import sorting
[lint.isort]
case-sensitive = false
combine-as-imports = true
lines-after-imports = 2
order-by-type = true
known-first-party = ["src"]
section-order = [
    "future",
    "standard-library",
    "third-party",
    "first-party",
    "local-folder",
]

# FLAKE8-TIDY-IMPORTS: Clean import structure
[lint.flake8-tidy-imports]
ban-relative-imports = "all"

# FLAKE8-TYPE-CHECKING: Automated TYPE_CHECKING blocks
[lint.flake8-type-checking]
runtime-evaluated-base-classes = [
    "pydantic.BaseModel",
    "pydantic_settings.BaseSettings",
    "sqlalchemy.orm.DeclarativeBase",
]
runtime-evaluated-decorators = ["pydantic.validate_call", "attrs.define"]

[lint.per-file-ignores]
# Rules for Test files
"tests/**/*.py" = [
    "S101",    # Allow assert
    "PLR2004", # Allow magic numbers
    "S105",    # Allow hardcoded passwords
    "S106",    # Allow hardcoded password assignments
]
