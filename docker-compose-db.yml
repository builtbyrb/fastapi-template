services:
  postgredb:
    container_name: postgredb
    restart: unless-stopped
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_HOST_AUTH_METHOD: md5
      POSTGRES_INITDB_ARGS: --auth=md5
    networks:
      - pgbouncer-net
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready", "-d", "${POSTGRES_DB}"]
      interval: 1m30s
      timeout: 30s
      retries: 5
      start_period: 20s
    volumes:
      - ./postgres-data:/var/lib/postgresql/data

  pgbouncer:
    container_name: pgbouncer
    restart: unless-stopped
    image: edoburu/pgbouncer:v1.25.1-p0
    environment:
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_HOST: ${POSTGRES_HOST}
      DB_NAME: ${POSTGRES_DB}
      ADMIN_USERS: postgres,admin
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 1000
      DEFAULT_POOL_SIZE: 90
    networks:
      - database-net
      - pgbouncer-net
    deploy:
      resources:
        limits:
          cpus: "0.1"
          memory: 64M
    healthcheck:
      test: ["CMD", "pg_isready", "-h", "${POSTGRES_HOST}"]
      interval: 1m30s
      timeout: 30s
      retries: 5
      start_period: 20s
    depends_on:
      postgredb:
        condition: service_healthy

  redis:
    container_name: redis
    restart: unless-stopped
    image: redis:7-alpine
    environment:
      - REDIS_ARGS=--appendonly yes
    networks:
      - database-net
    deploy:
      resources:
        limits:
          cpus: "0.1"
          memory: 512M
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 1m30s
      timeout: 30s
      retries: 5
      start_period: 20s
    volumes:
      - ./redis-data:/data

  adminer:
    container_name: adminer
    restart: unless-stopped
    image: adminer:5.4.2-standalone
    environment:
      ADMINER_DEFAULT_SERVER: pgbouncer
      ADMINER_DEFAULT_SYSTEM: pgsql
    networks:
      - database-net
      - vpn-net
    ports:
      - 10.66.66.1:8081:8080
    deploy:
      resources:
        limits:
          cpus: "0.1"
          memory: 64M
    depends_on:
      pgbouncer:
        condition: service_healthy
      postgredb:
        condition: service_healthy
