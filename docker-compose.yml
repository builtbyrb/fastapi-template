services:
  postgredb:
    image: postgres:16-alpine
    container_name: postgredb
    restart: unless-stopped
    networks:
      - fastapi-net
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1024M
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_HOST_AUTH_METHOD: md5
      POSTGRES_INITDB_ARGS: --auth=md5
    healthcheck:
      test: ["CMD-SHELL", "pg_isready", "-d", "${POSTGRES_DB}"]
      interval: 1m30s
      timeout: 30s
      retries: 5
      start_period: 10s

  pgbouncer:
    image: edoburu/pgbouncer:v1.25.1-p0
    container_name: pgbouncer
    restart: unless-stopped
    networks:
      - fastapi-net
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 64M
    ports:
      - "5432:${PG_BOUNCER_PORT}"
    environment:
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_HOST: ${POSTGRES_HOST}
      DB_NAME: ${POSTGRES_DB}
      ADMIN_USERS: postgres,admin
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 1000
      DEFAULT_POOL_SIZE: 20
    healthcheck:
      test: ["CMD", "pg_isready", "-h", "${POSTGRES_HOST}"]
      interval: 1m30s
      timeout: 30s
      retries: 5
      start_period: 10s
    depends_on:
      postgredb:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    networks:
      - fastapi-net
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
    ports:
      - "6379:${REDIS_PORT}"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 1m30s
      timeout: 30s
      retries: 5
      start_period: 10s

  adminer:
    image: adminer:5.4.2-standalone
    container_name: adminer
    restart: unless-stopped
    networks:
      - fastapi-net
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 64M
    ports:
      - 8081:8080
    environment:
      ADMINER_DEFAULT_SERVER: pgbouncer
      ADMINER_DEFAULT_SYSTEM: pgsql
    depends_on:
      pgbouncer:
        condition: service_healthy
      postgredb:
        condition: service_healthy

  fastapi:
    image: ghcr.io/builtbyrb/fastapi-template:latest
    restart: unless-stopped
    networks:
      - fastapi-net
    ports:
      - :8000
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M
    healthcheck:
      test: python3 -c "import urllib.request; urllib.request.urlopen('http://localhost:8000/health/', timeout=5)"
      interval: 1m30s
      timeout: 30s
      retries: 5
      start_period: 10s
    env_file:
      - .env
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.backend.rule=Host(`fastapi.localhost`)"
      - "traefik.http.routers.backend.entrypoints=web"
      - "--providers.docker.exposedbydefault=false"
    depends_on:
      pgbouncer:
        condition: service_healthy
      postgredb:
        condition: service_healthy
      redis:
        condition: service_healthy

  docker-proxy:
    image: tecnativa/docker-socket-proxy:v0.4.2
    container_name: docker-proxy
    restart: unless-stopped
    environment:
      - CONTAINERS=1
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - fastapi-net
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M
    healthcheck:
      test: wget --spider http://docker-proxy:2375/version || exit 1
      interval: 1m30s
      timeout: 30s
      retries: 5
      start_period: 10s

  traefik:
    image: traefik:v3.6.12
    command:
      - "--api.insecure=true"
      - "--providers.docker=true"
      - "--entrypoints.web.address=:80"
      - "--providers.docker.endpoint=tcp://docker-proxy:2375"
      - "--providers.docker.exposedbydefault=false"
    ports:
      - "80:80"
      - "8080:8080"
    networks:
      - fastapi-net
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512M
    healthcheck:
      test: traefik healthcheck --ping
      interval: 1m30s
      timeout: 30s
      retries: 5
      start_period: 10s
    depends_on:
      fastapi:
        condition: service_healthy
      docker-proxy:
        condition: service_healthy

networks:
  fastapi-net:
