version: "3.8"

services:
  postgredb:
    image: postgres:16-alpine
    container_name: postgredb
    restart: always
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 1024M
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_HOST_AUTH_METHOD: md5
      POSTGRES_INITDB_ARGS: --auth=md5
    healthcheck:
      test: ["CMD-SHELL", "pg_isready", "-d", "${POSTGRES_DB}"]
      interval: 1m30s
      timeout: 30s
      retries: 5
      start_period: 10s

  pgbouncer:
    image: edoburu/pgbouncer:v1.25.1-p0
    container_name: pgbouncer
    restart: always
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
    ports:
      - "5432:${PG_BOUNCER_PORT}"
    environment:
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
      DB_HOST: ${POSTGRES_HOST}
      DB_NAME: ${POSTGRES_DB}
      ADMIN_USERS: postgres,admin
      POOL_MODE: transaction
      MAX_CLIENT_CONN: 1000
      DEFAULT_POOL_SIZE: 20
    healthcheck:
      test: ["CMD", "pg_isready", "-h", "${POSTGRES_HOST}"]
      interval: 1m30s
      timeout: 30s
      retries: 5
      start_period: 10s
    depends_on:
      postgredb:
        condition: service_healthy

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: always
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512M
    ports:
      - "6379:${REDIS_PORT}"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 1m30s
      timeout: 30s
      retries: 5
      start_period: 10s

  adminer:
    image: adminer:5.4.2-standalone
    container_name: adminer
    restart: always
    ports:
      - 8080:8080
    environment:
      ADMINER_DEFAULT_SERVER: pgbouncer
      ADMINER_DEFAULT_SYSTEM: pgsql
    depends_on:
      pgbouncer:
        condition: service_healthy
      postgredb:
        condition: service_healthy

  fastapi:
    image: ghcr.io/builtbyrb/fastapi-template:latest
    container_name: fastapi
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "4"
          memory: 1024M
    healthcheck:
      test: python3 -c "import urllib.request; urllib.request.urlopen('http://localhost:8000/health/', timeout=5)"
      interval: 1m30s
      timeout: 30s
      retries: 5
      start_period: 10s
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      pgbouncer:
        condition: service_healthy
      postgredb:
        condition: service_healthy
      redis:
        condition: service_healthy
