service:
  flush: 5
  daemon: off
  log_level: info
  http_server: on
  http_listen: 0.0.0.0
  http_port: 2020

pipeline:
  inputs:
    - name: cpu
      tag: host.cpu
      interval_sec: 20

    - name: disk
      tag: host.disk
      interval_sec: 20

    - name: mem
      tag: host.memory
      interval_sec: 20

    - name: tail
      path: /var/lib/docker/containers/*/*.log
      tag: docker.logs
      parser: docker

    - name: docker
      interval_sec: 20
      tag: docker.stats

  outputs:
    - name: http
      match: "*"
      host: ${AXIOM_REGION}
      port: 443
      uri: /v1/ingest/${AXIOM_DATASET_NAME}
      header: Authorization Bearer ${AXIOM_TOKEN}
      compress: gzip
      format: json
      json_date_key: _time
      json_date_format: iso8601
      tls: on
